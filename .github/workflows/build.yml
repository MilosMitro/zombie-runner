name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller

      - name: Build EXE
        run: |
          if (Test-Path "menu_music.mp3") {
            pyinstaller --onefile --windowed --name "Zombie Runner" --add-data "menu_music.mp3;." zombie_runner.py
          } else {
            pyinstaller --onefile --windowed --name "Zombie Runner" zombie_runner.py
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zombie-Runner-Windows
          path: dist/Zombie Runner.exe
```

